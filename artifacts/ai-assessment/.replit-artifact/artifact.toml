kind = "web"
previewPath = "/"
title = "AI Maturity Assessment Platform"
version = "1.0.0"
id = "artifacts/ai-assessment"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23614

[services.development]
run = "pnpm --filter @workspace/ai-assessment run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-assessment", "run", "build" ]
publicDir = "artifacts/ai-assessment/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23614"
BASE_PATH = "/"
